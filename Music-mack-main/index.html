<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Mack | Mood-Based Music Player</title>
    <meta name="description" content="Discover music that matches your mood. Play songs instantly based on how you feel — happy, sad, chill, energetic, and more.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loader">
            <div class="loader-ring"></div>
            <span>Loading songs...</span>
        </div>
    </div>

    <nav class="navbar">
        <div class="logo">
            <i class="fas fa-bolt"></i>
            <span>MUSIC MACK</span>
        </div>
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search songs, artists, albums...">
        </div>
        <div class="nav-actions">
            <a href="home.html" class="home-link" title="Home">
                <i class="fas fa-home"></i>
            </a>
        </div>
    </nav>

    <div class="main-wrapper">
        <aside class="sidebar">
            <div class="menu-group">
                <h3>Menu</h3>
                <div class="menu-item active" onclick="window.location.href='home.html'">
                    <i class="fas fa-home"></i> Home
                </div>
                <div class="menu-item" onclick="switchMood('happy')">
                    <i class="fas fa-compass"></i> Discover
                </div>
            </div>
            <div class="menu-group">
                <h3>Moods</h3>
                <div id="playlistContainer">
                </div>
            </div>
        </aside>

        <main class="content">
            <section class="mood-section">
                <div class="mood-header">
                    <span>Your Current Mood: <strong id="moodLabel" style="color: var(--accent-color)">Chill</strong></span>
                    <span class="song-count" id="songCount">0 songs</span>
                </div>
                <input type="range" min="1" max="100" value="10" class="mood-slider" id="moodSlider">
                <div class="mood-labels">
                    <span>Chill</span>
                    <span>Happy</span>
                    <span>Romantic</span>
                    <span>Focus</span>
                    <span>Energetic</span>
                    <span>Party</span>
                    <span>Angry</span>
                </div>
            </section>

            <h2 class="section-title">Recommended for You</h2>
            <div class="grid-layout" id="musicGrid">
            </div>
        </main>
    </div>

    <footer class="player">
        <div class="current-track">
            <img src="https://via.placeholder.com/100/1a1a2e/ffffff?text=♪" id="playerThumb" alt="Song artwork">
            <div class="track-info">
                <h4 id="playerTitle">Select a song</h4>
                <p id="playerArtist">—</p>
            </div>
        </div>

        <div class="player-controls">
            <div class="buttons">
                <i class="fas fa-random control-icon" id="shuffleBtn" style="color: var(--text-dim)" title="Shuffle"></i>
                <i class="fas fa-step-backward control-icon" id="prevBtn" title="Previous"></i>
                <div class="play-btn" id="playBtn" title="Play/Pause">
                    <i class="fas fa-play"></i>
                </div>
                <i class="fas fa-step-forward control-icon" id="nextBtn" title="Next"></i>
                <i class="fas fa-redo control-icon" id="repeatBtn" style="color: var(--text-dim)" title="Repeat"></i>
            </div>
            <div class="progress-container">
                <span id="currentTime">0:00</span>
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
                <span id="totalTime">0:00</span>
            </div>
        </div>

        <div class="volume-controls">
            <i class="fas fa-volume-up"></i>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70">
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
